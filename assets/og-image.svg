<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Mickey Ever After — todos os seus itens favoritos do universo Disney">
  <title>Mickey Ever After</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#072050"/>
      <stop offset="55%" stop-color="#1255a0"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Decorative 3-circle silhouette (geometric primitive, not a trademarked character) -->
  <g opacity="0.9">
    <circle cx="540" cy="190" r="40" fill="#ffffff"/>
    <circle cx="660" cy="190" r="40" fill="#ffffff"/>
    <circle cx="600" cy="295" r="68" fill="#ffffff"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="455" text-anchor="middle"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-size="76" font-weight="700" fill="#ffffff" letter-spacing="0.5">
    Mickey Ever After
  </text>

  <!-- Tagline -->
  <text x="600" y="510" text-anchor="middle"
        font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="28" font-weight="400" fill="rgba(255,255,255,0.92)">
    Itens favoritos do universo Disney — de fã para fã
  </text>

  <!-- Subtle accent line -->
  <rect x="540" y="540" width="120" height="3" rx="1.5" fill="#e74c3c"/>
</svg>
